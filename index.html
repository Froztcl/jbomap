<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial, sans-serif; display:flex; flex-direction:column; height:100vh; background:#f5f5f5; }

  header {
    background:#1a2e4a;
    color:white;
    padding:10px 20px;
    display:flex;
    align-items:center;
    gap:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.3);

  }
  .header-logos { display:flex; align-items:center; gap:8px; }
  .header-logos svg { width:44px; height:44px; }
  .header-plus { font-size:20px; color:#F5821F; font-weight:700; }
  header h1 { font-size:18px; font-weight:700; color:white; }
  header .sub { font-size:12px; color:rgba(255,255,255,0.65); margin-top:2px; }

  .layout { display:flex; flex:1; overflow:hidden; }

  #sidebar {
    width:290px;
    background:white;
    overflow-y:auto;
    border-right:1px solid #e0e0e0;
    flex-shrink:0;
    display:flex;
    flex-direction:column;
  }

  .search-box {
    padding:10px 12px;
    position:sticky; top:0;
    background:white;
    border-bottom:1px solid #eee;
    z-index:10;
  }
  .search-box input {
    width:100%;
    padding:7px 12px;
    border:1.5px solid #ddd;
    border-radius:20px;
    font-size:13px;
    outline:none;
  }
  .search-box input:focus { border-color:#2EA84F; }

  .filtros {
    display:flex;
    gap:6px;
    padding:8px 12px;
    border-bottom:1px solid #eee;
    background:white;
    position:sticky;
    top:47px;
    z-index:9;
  }
  .btn-filtro {
    flex:1;
    padding:5px 4px;
    border:1.5px solid #ddd;
    border-radius:14px;
    font-size:11px;
    font-weight:600;
    cursor:pointer;
    background:white;
    color:#555;
    transition:all 0.15s;
    text-align:center;
  }
  .btn-filtro.active-todos { border-color:#1a2e4a; background:#1a2e4a; color:white; }
  .btn-filtro.active-frozt { border-color:#F5821F; background:#F5821F; color:white; }
  .btn-filtro.active-jumbo { border-color:#2EA84F; background:#2EA84F; color:white; }

  .count { font-size:11px; color:#888; padding:5px 14px 2px; }

  .sala-item {
    padding:9px 12px;
    border-bottom:1px solid #f0f0f0;
    cursor:pointer;
    transition:background 0.12s;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .sala-item:hover { background:#f5faf7; }
  .sala-item.active { background:#eaf7ef; border-left:3px solid #2EA84F; }
  .sala-item.active.darkstore { border-left-color:#F5821F; background:#fff4ec; }
  .item-icons { display:flex; flex-direction:column; gap:3px; align-items:center; flex-shrink:0; }
  .item-icons svg { width:26px; height:26px; }
  .item-text { flex:1; min-width:0; }
  .sala-id { font-size:10px; color:#888; font-weight:700; }
  .sala-nombre { font-size:12px; font-weight:700; color:#1a1a1a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sala-dir { font-size:10px; color:#777; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sala-ciudad { font-size:10px; color:#aaa; }

  #map { flex:1; }

  .leaflet-popup-content-wrapper { border-radius:10px !important; box-shadow:0 4px 16px rgba(0,0,0,0.18) !important; padding:0 !important; }
  .leaflet-popup-content { margin:0 !important; }
  .popup-inner { font-family:Arial,sans-serif; min-width:200px; padding:12px 14px; }
  .popup-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .popup-header svg { width:36px; height:36px; flex-shrink:0; }
  .popup-id { font-size:10px; color:#888; font-weight:700; }
  .popup-nombre { font-size:13px; font-weight:700; color:#1a1a1a; line-height:1.3; }
  .popup-dir { font-size:11px; color:#555; margin-bottom:2px; }
  .popup-ciudad { font-size:11px; color:#999; margin-bottom:8px; }
  .popup-badges { display:flex; gap:5px; margin-bottom:8px; }
  .badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:10px; }
  .badge-jumbo { background:#e6f7ec; color:#2EA84F; }
  .badge-frozt { background:#fff0e0; color:#F5821F; }
  .badge-dark { background:#1a2e4a; color:white; }
  .popup-link { display:inline-block; font-size:11px; color:white; background:#1a2e4a; padding:5px 12px; border-radius:12px; text-decoration:none; }
  .popup-link:hover { background:#2a3e5a; }

function makeIconUrl(svgStr) {
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
}

      <text x="24" y="19" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="8" fill="white" text-anchor="middle">DARK</text>

      <text x="24" y="39" font-family="Arial,sans-serif" font-size="5" fill="rgba(255,255,255,0.85)" text-anchor="middle">FRÖZT</text>

03C55.1 59.474 46.518 70.794 35.708 80.745 24.928 90.656 12.16 98.608-2.244 104.367-16.762 110.166-32.523 113.114-49.08 113.114-65.494 113.114-81.189 110.166-95.723 104.367-110.093 98.608-122.878 90.679-133.704 80.796-144.621 70.822-153.277 59.439-159.434 46.927-166.755 31.886-170.482 16.097-170.482 0-170.482-15.5-167.187-30.547-160.701-44.735-154.884-57.56-146.377-69.346-135.437-79.762-124.566-90.105-111.588-98.398-96.847-104.413-82.024-110.456-65.949-113.523-49.08-113.523-32.07-113.523-15.933-110.456-1.097-104.407 13.626-98.398 26.581-90.145 37.372-79.876 48.227-69.55 56.78-57.69 62.853-44.49 69.14-30.206 72.327-15.233 72.327 0 72.327 16.568 68.584 32.415 61.205 47.103" fill="#ef803c"/></svg>

    <circle cx="35" cy="11" r="4" fill="#C8E840"/>
    <text x="24" y="24" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="11" fill="white" text-anchor="middle" dominant-baseline="middle">JUMBO</text>
    <text x="24" y="34" font-family="Arial,sans-serif" font-size="5.5" fill="rgba(255,255,255,0.9)" text-anchor="middle">cencosud</text>

const map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 18
}).addTo(map);

let marcadores = [];
let filtroActivo = 'todos';
let itemActivo = null;

sucursales.forEach((s, i) => {
  const icon = makeDualIcon(s.frozt, s.dark);
  const marker = L.marker([s.lat, s.lng], {icon}).addTo(map);
  const gmurl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.nombre+' '+s.dir+' '+s.ciudad+' Chile')}`;

  const badgesDark = s.dark ? `<span class="badge badge-dark">DARK STORE</span>` : '';
  const badgesJumbo = !s.dark ? `<span class="badge badge-jumbo">JUMBO</span>` : '';
  const badgesFrozt = s.frozt ? `<span class="badge badge-frozt">FRÖZT</span>` : '';

  const iconoPopup = s.dark ? SVG_DARK : (s.frozt ? `${SVG_JUMBO}${SVG_FROZT}` : SVG_JUMBO);

  marker.bindPopup(`
    <div class="popup-inner">
      <div class="popup-header">
        <div style="display:flex;gap:4px">${s.dark ? `<svg width="36" height="36">${SVG_DARK.slice(5,-6)}</svg>` : `<svg width="36" height="36">${SVG_JUMBO.slice(5,-6)}</svg>${s.frozt ? `<svg width="36" height="36">${SVG_FROZT.slice(5,-6)}</svg>`:''}`}</div>
        <div>
          <div class="popup-id">${s.id}</div>
          <div class="popup-nombre">${s.nombre}</div>
        </div>
      </div>
      <div class="popup-dir">📍 ${s.dir}</div>
      <div class="popup-ciudad">🏙 ${s.ciudad}</div>
      <div class="popup-badges">${badgesDark}${badgesJumbo}${badgesFrozt}</div>
      <a class="popup-link" href="${gmurl}" target="_blank">Ver en Google Maps ↗</a>
    </div>
  `, {maxWidth: 260});

  marker.on('click', () => activarItem(i));
  marcadores.push({s, marker, idx: i});
});

const allGroup = L.featureGroup(marcadores.map(m => m.marker));
map.fitBounds(allGroup.getBounds().pad(0.1));

function activarItem(idx) {
  if (itemActivo !== null) {
    const prev = document.getElementById('item-' + itemActivo);
    if (prev) prev.classList.remove('active');
  }
  itemActivo = idx;
  const el = document.getElementById('item-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({behavior:'smooth', block:'nearest'}); }
}

function setFiltro(f) {
  filtroActivo = f;
  document.querySelectorAll('.btn-filtro').forEach(b => b.className = 'btn-filtro');
  if (f === 'todos') document.getElementById('btn-todos').classList.add('active-todos');
  else if (f === 'frozt') document.getElementById('btn-frozt').classList.add('active-frozt');
  else document.getElementById('btn-nofrozt').classList.add('active-jumbo');
  aplicarFiltros();
}

function aplicarFiltros() {
  const q = document.getElementById('buscador').value.toLowerCase().trim();
  const items = marcadores.filter(({s}) => {
    const matchQ = !q || s.nombre.toLowerCase().includes(q) || s.ciudad.toLowerCase().includes(q) || s.dir.toLowerCase().includes(q) || s.id.toLowerCase().includes(q);
    const matchF = filtroActivo === 'todos' || (filtroActivo === 'frozt' && s.frozt) || (filtroActivo === 'nofrozt' && !s.frozt);
    return matchQ && matchF;
  });
  renderLista(items);
}

function renderLista(items) {
  const lista = document.getElementById('lista-salas');
  const label = document.getElementById('count-label');
  lista.innerHTML = '';
  label.textContent = `${items.length} ${items.length === 1 ? 'sucursal' : 'sucursales'}`;

  items.forEach(({s, idx}) => {
    const div = document.createElement('div');
    div.className = 'sala-item' + (s.dark ? ' darkstore' : '');
    div.id = 'item-' + idx;

    const iconosHTML = s.dark
      ? `<svg width="26" height="26" viewBox="0 0 48 48">${SVG_DARK.slice(5,-6)}</svg>`
      : `<svg width="26" height="26" viewBox="0 0 48 48">${SVG_JUMBO.slice(5,-6)}</svg>${s.frozt ? `<svg width="26" height="26" viewBox="0 0 48 48">${SVG_FROZT.slice(5,-6)}</svg>` : ''}`;

    div.innerHTML = `
      <div class="item-icons">${iconosHTML}</div>
      <div class="item-text">
        <div class="sala-id">${s.id}</div>
        <div class="sala-nombre">${s.nombre}</div>
        <div class="sala-dir">${s.dir}</div>
        <div class="sala-ciudad">📍 ${s.ciudad}</div>
      </div>`;
    div.onclick = () => {
      activarItem(idx);
      map.setView([s.lat, s.lng], 16);
      marcadores[idx].marker.openPopup();
    };
    lista.appendChild(div);
  });

  // Actualizar contadores botones
  const total = marcadores.length;
  const conFrozt = marcadores.filter(m => m.s.frozt).length;
  const sinFrozt = marcadores.filter(m => !m.s.frozt).length;
  document.getElementById('btn-todos').textContent = `Todos (${total})`;
  document.getElementById('btn-frozt').textContent = `🟠 Con Frozt (${conFrozt})`;
  document.getElementById('btn-nofrozt').textContent = `🟢 Solo Jumbo (${sinFrozt})`;
}

aplicarFiltros();
</script>
</body>
</html>
